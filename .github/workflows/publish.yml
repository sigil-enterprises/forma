name: Publish

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  discover:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      documents: ${{ steps.list.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover document projects
        id: list
        run: |
          # Find directories containing forma.yaml
          DOCS=$(find documents -name "forma.yaml" -exec dirname {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "json=$DOCS" >> $GITHUB_OUTPUT

  render-and-publish:
    needs: discover
    if: ${{ needs.discover.outputs.documents != '[]' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/forma:latest
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}
    strategy:
      matrix:
        document: ${{ fromJson(needs.discover.outputs.documents) }}
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate
        run: forma validate ${{ matrix.document }}

      - name: Render
        run: forma render ${{ matrix.document }}

      - name: Publish to Google Drive
        run: forma publish ${{ matrix.document }}
        # Only publishes if google_drive_folder_id is set in forma.yaml
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.document }}-pdfs
          path: var/builds/${{ matrix.document }}/*.pdf
          if-no-files-found: warn
