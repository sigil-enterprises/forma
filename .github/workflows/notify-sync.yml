name: Notify dist — sync requested

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  notify:
    if: github.repository_owner == 'slivern-corporate-services'
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for dist dispatch
        id: dist-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CONTRIB_SANDBOX_APP_ID }}
          private-key: ${{ secrets.CONTRIB_SANDBOX_PRIVATE_KEY }}
          owner: slivern-corporate-services
          repositories: dist

      - name: Dispatch sync to dist
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.dist-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'slivern-corporate-services',
              repo:  'dist',
              event_type: 'sync-requested',
              client_payload: {
                repo: context.repo.repo,
                ref:  context.ref
              }
            })
