name: Build base image

on:
  push:
    paths:
      - Dockerfile
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: base
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/forma-base:latest
          cache-from: type=gha,scope=forma-base
          cache-to:   type=gha,scope=forma-base,mode=max
          build-args: |
            ORGANIZATION=${{ github.repository_owner }}
          secrets: |
            github_token=${{ secrets.PAT_ORG_REPO_READ || github.token }}
