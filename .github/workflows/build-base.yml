name: Build base image

on:
  push:
    paths:
      - Dockerfile.base
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/forma-base:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.PAT_ORG_REPO_READ || github.token }}
            ORGANIZATION=${{ github.repository_owner }}
