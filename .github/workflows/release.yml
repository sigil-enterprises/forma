name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate-tag:
    uses: ./.github/workflows/release-validate.yml

  release:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: none
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --title "forma $TAG — Python to Rust Port" \
            --notes-file .github/RELEASE_TEMPLATE.md

  build:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: none
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Build
        run: make build
      - name: Test
        run: make test

  publish:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: none
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}
      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/forma:release-${{ github.ref_name }}
          cache-from: type=gha,scope=forma-release
          build-args: |
            ORGANIZATION=${{ github.repository_owner }}
      - name: Push sticky latest tag
        if: github.event_name == 'push' || github.event.inputs.tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest ${{ github.event.inputs.tag || github.ref_name }}
          git push --force origin latest
