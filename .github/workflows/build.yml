name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[test,ci]

      - name: Run tests
        run: pytest --tb=short -q

      - name: Generate coverage
        run: |
          pip install pytest-cov
          pytest --cov=src/forma --cov-report=xml:docs/reports/coverage/coverage.xml \
                 --cov-report=html:docs/reports/coverage -q || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: docs/reports/coverage/
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}
          submodules: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/forma:latest
          build-args: |
            GITHUB_TOKEN=${{ secrets.PAT_ORG_REPO_READ || github.token }}
            ORGANIZATION=${{ github.repository_owner }}
