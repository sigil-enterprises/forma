name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .[test,ci]

      - name: Run tests
        run: pytest --tb=short -q

      - name: Generate coverage report
        run: |
          pip install pytest-cov
          pytest --cov=src/forma \
                 --cov-report=xml:docs/reports/coverage/coverage.xml \
                 --cov-report=html:docs/reports/coverage \
                 -q 2>/dev/null || true
        continue-on-error: true

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          pip install genbadge[coverage]
          genbadge coverage \
            -i docs/reports/coverage/coverage.xml \
            -o docs/reports/coverage/badge.svg \
            2>/dev/null || true
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: docs/reports/coverage/
          if-no-files-found: ignore

  build-base:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: base
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/forma-base:latest
          cache-from: type=gha,scope=forma-base
          cache-to:   type=gha,scope=forma-base,mode=max
          build-args: |
            ORGANIZATION=${{ github.repository_owner }}
          secrets: |
            github_token=${{ secrets.PAT_ORG_REPO_READ || github.token }}

  docker:
    runs-on: ubuntu-latest
    needs: build-base
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PAT_ORG_REPO_READ || github.token }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/forma:latest
            ghcr.io/${{ github.repository_owner }}/forma:${{ github.sha }}
          cache-from: type=gha,scope=forma
          cache-to:   type=gha,scope=forma,mode=max
          build-args: |
            ORGANIZATION=${{ github.repository_owner }}
