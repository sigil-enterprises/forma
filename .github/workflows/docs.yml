name: Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Authenticate private org repositories
        run: |
          git config --global \
            url."https://${{ secrets.PAT_ORG_REPO_READ || github.token }}@github.com/${{ github.repository_owner }}/".insteadOf \
            "https://github.com/${{ github.repository_owner }}/"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages:gh-pages || true

      - name: Build rustdoc
        run: cargo doc --no-deps --workspace

      - name: Deploy docs (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp -r target/doc gh-pages/docs/$VERSION
          git add gh-pages
          git commit -m "docs: publish $VERSION" || true
          git push origin gh-pages

      - name: Deploy dev docs (on main push)
        if: github.ref == 'refs/heads/main'
        run: |
          cp -r target/doc gh-pages/docs/dev
          git add gh-pages
          git commit -m "docs: update dev docs" || true
          git push origin gh-pages
