name: Docs

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Authenticate private org repositories
        run: |
          git config --global url."https://${{ secrets.PAT_ORG_REPO_READ }}@github.com/${{ github.repository_owner }}/".insteadOf \
            "https://github.com/${{ github.repository_owner }}/"

      - name: Install package and doc dependencies
        run: pip install -e ".[docs]"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy docs
        run: mkdocs gh-deploy --force --clean
