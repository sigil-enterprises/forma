$schema: "http://json-schema.org/draft-07/schema#"
$id: "proposal-content"
title: ProposalContent
description: >
  Semantic content file for a Sigil business proposal (content.yaml).
  Format-agnostic — this file describes who the client is, what the problem is,
  and what the solution looks like. It is referenced by slides.yaml / report.yaml
  via !include "@content.yaml:dot.path" tags.
type: object
required:
  - resourceType
  - engagement
  - client
properties:
  resourceType:
    type: string
    const: ProposalContent

  engagement:
    $ref: "#/definitions/Engagement"

  client:
    $ref: "#/definitions/Client"

  executive_summary:
    $ref: "#/definitions/ExecutiveSummary"

  context:
    $ref: "#/definitions/Context"

  solution:
    $ref: "#/definitions/Solution"

  timeline:
    $ref: "#/definitions/Timeline"

  investment:
    $ref: "#/definitions/Investment"

  team:
    $ref: "#/definitions/Team"

  next_steps:
    $ref: "#/definitions/NextSteps"

  closing:
    $ref: "#/definitions/Closing"

  publishing:
    type: object
    description: Optional publishing configuration (overrides forma.yaml defaults).
    properties:
      google_drive_folder_id:
        type: string
      filename_prefix:
        type: string
    additionalProperties: false

additionalProperties: false

definitions:
  Engagement:
    type: object
    required: [title]
    properties:
      title:
        type: string
        description: Full engagement / proposal title.
      subtitle:
        type: string
      reference:
        type: string
        description: Unique reference code, e.g. SGLR-2026-NUPCO-001.
      date:
        type: string
        description: Proposal date in ISO 8601 format (YYYY-MM-DD).
      version:
        type: string
      confidentiality:
        type: string
        enum: [public, internal, confidential, strictly_confidential]
      language:
        type: string
        default: en
    additionalProperties: false

  Client:
    type: object
    required: [name]
    properties:
      name:
        type: string
      industry:
        type: string
      size:
        type: string
      contact:
        type: object
        properties:
          name:
            type: string
          title:
            type: string
          email:
            type: string
        additionalProperties: false
    additionalProperties: false

  ExecutiveSummary:
    type: object
    required: [headline]
    properties:
      headline:
        type: string
        description: One-line headline summarising the value proposition.
      body:
        type: string
        description: 2-4 sentence executive summary paragraph.
      key_points:
        type: array
        description: 3-6 bullet points highlighting key aspects.
        items:
          type: string
        maxItems: 8
    additionalProperties: false

  Context:
    type: object
    properties:
      problem_statement:
        type: string
      pain_points:
        type: array
        items:
          $ref: "#/definitions/TitledItem"
      current_state:
        type: object
        properties:
          description:
            type: string
          metrics:
            type: array
            items:
              $ref: "#/definitions/Metric"
        additionalProperties: false
    additionalProperties: false

  Solution:
    type: object
    properties:
      overview:
        type: string
      pillars:
        type: array
        items:
          $ref: "#/definitions/TitledItem"
        maxItems: 4
      differentiators:
        type: array
        items:
          $ref: "#/definitions/TitledItem"
    additionalProperties: false

  Timeline:
    type: object
    required: [phases]
    properties:
      phases:
        type: array
        items:
          $ref: "#/definitions/TimelinePhase"
    additionalProperties: false

  Investment:
    type: object
    required: [phases]
    properties:
      currency:
        type: string
        default: USD
      secondary_currency:
        type: string
      exchange_rate:
        type: number
      notes:
        type: array
        items:
          type: string
      phases:
        type: array
        items:
          $ref: "#/definitions/InvestmentPhase"
    additionalProperties: false

  Team:
    type: object
    properties:
      consultants:
        type: array
        items:
          $ref: "#/definitions/TeamMember"
      partners:
        type: array
        items:
          $ref: "#/definitions/Partner"
    additionalProperties: false

  NextSteps:
    type: object
    required: [steps]
    properties:
      intro:
        type: string
      steps:
        type: array
        items:
          $ref: "#/definitions/TitledItem"
    additionalProperties: false

  Closing:
    type: object
    properties:
      tagline:
        type: string
      email:
        type: string
      website:
        type: string
      logo:
        type: string
    additionalProperties: false

  # ── Shared sub-types ────────────────────────────────────────────────────

  TitledItem:
    type: object
    required: [title]
    properties:
      title:
        type: string
      description:
        type: string
      icon:
        type: string
    additionalProperties: false

  Metric:
    type: object
    required: [value, label]
    properties:
      value:
        type: string
      label:
        type: string
    additionalProperties: false

  TimelinePhase:
    type: object
    required: [name]
    properties:
      name:
        type: string
      duration:
        type: string
      start_week:
        type: integer
      end_week:
        type: integer
      activities:
        type: array
        items:
          type: string
      deliverables:
        type: array
        items:
          type: string
    additionalProperties: false

  InvestmentPhase:
    type: object
    required: [name, line_items]
    properties:
      name:
        type: string
      duration:
        type: string
      line_items:
        type: array
        items:
          $ref: "#/definitions/LineItem"
    additionalProperties: false

  LineItem:
    type: object
    required: [service, total_usd]
    properties:
      service:
        type: string
      quantity:
        type: number
      unit:
        type: string
      rate_usd:
        type: number
      total_usd:
        type: number
    additionalProperties: false

  TeamMember:
    type: object
    required: [name, role]
    properties:
      name:
        type: string
      role:
        type: string
      credentials:
        type: string
      experience_years:
        type: integer
      education:
        type: array
        items:
          type: string
      expertise:
        type: array
        items:
          type: string
      photo:
        type: string
    additionalProperties: false

  Partner:
    type: object
    required: [name]
    properties:
      name:
        type: string
      logo:
        type: string
      description:
        type: string
    additionalProperties: false
