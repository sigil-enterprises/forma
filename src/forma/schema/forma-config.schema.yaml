$schema: "http://json-schema.org/draft-07/schema#"
$id: "forma-config"
title: FormaConfig
description: >
  Project configuration file (forma.yaml). Declares content source, style,
  templates, output directory, and publishing settings.
type: object
required:
  - resourceType
  - templates
properties:
  resourceType:
    type: string
    const: FormaConfig
  content:
    type: string
    default: content.yaml
    description: Path to content.yaml, relative to this forma.yaml.
  style:
    type: string
    default: style.yaml
    description: Path to style.yaml, relative to this forma.yaml.
  templates:
    type: object
    description: Named template entries. Key is the template name (e.g. slides, report).
    additionalProperties:
      $ref: "#/definitions/TemplateEntry"
  output_dir:
    type: string
    default: "../../var/builds"
    description: Output directory for rendered PDFs, relative to this forma.yaml.
  publishing:
    $ref: "#/definitions/PublishConfig"
additionalProperties: false

definitions:
  TemplateEntry:
    type: object
    required:
      - path
      - mapping
    properties:
      path:
        type: string
        description: Path to the template directory, relative to this forma.yaml.
      mapping:
        type: string
        description: Path to the mapping file (e.g. slides.yaml), relative to this forma.yaml.
    additionalProperties: false

  PublishConfig:
    type: object
    properties:
      google_drive_folder_id:
        type: string
        default: ""
      filename_prefix:
        type: string
        default: ""
    additionalProperties: false
