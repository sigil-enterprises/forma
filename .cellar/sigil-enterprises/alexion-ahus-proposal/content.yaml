executive_summary:
  headline: "Generating expert consensus on Ravulizumab positioning in complex aHUS scenarios through a Modified Delphi methodology"
  body: >
    Sigil Scientific Enterprises proposes to collaborate with Alexion to design and
    facilitate an Expert Panel project focused on atypical Haemolytic Uraemic Syndrome
    (aHUS). Adhering to a robust scientific framework, this initiative utilises a
    Modified Delphi-based Expert Panel methodology to generate clinically actionable
    guidance on the positioning of Ravulizumab in complex patient scenarios — areas
    where current guidelines are absent or ambiguous. The project will convene six
    distinguished Key Opinion Leaders in Nephrology, synthesising their expertise into
    a peer-reviewed publication and a scientific congress poster.
  key_points:
    - "Modified Delphi methodology — structured, quantifiable, compliant with TARC requirements"
    - "6 KOL Nephrologists engaged via 1:1 interviews and a virtual plenary consensus meeting"
    - "Deliverables: peer-reviewed manuscript (English + Spanish) and congress poster"
    - "Full February–July timeline with manuscript submission before summer break"
    - "End-to-end HCP management including FMV honoraria and compliance documentation"

context:
  problem_statement: >
    aHUS is a rare, life-threatening disease driven by complement dysregulation.
    While Ravulizumab is established in standard scenarios, clinical practice reveals
    significant variability in complex cases — post-transplant patients, paediatric
    presentations, and overlapping thrombotic microangiopathy. No specific guidelines
    exist for these scenarios, leaving clinicians without a validated evidence base.
    The gap between clinical reality and published guidance creates uncertainty, delays
    treatment, and risks suboptimal patient outcomes.
  pain_points:
    - title: "Guideline Gaps in Complex Scenarios"
      description: "No published consensus exists for Ravulizumab use in post-transplant patients, paediatric cases, or overlap TMA presentations."
    - title: "Clinical Variability"
      description: "Treatment decisions in complex aHUS cases vary significantly across centres, leading to inconsistent outcomes and delayed initiation."
    - title: "No Quantified Expert Alignment"
      description: "Existing expert opinion is anecdotal. There is no structured, quantifiable measure of clinical agreement to guide practice or policy."
    - title: "TARC Compliance Requirement"
      description: "Internal approval processes require a scientifically grounded research framework — an informal advisory board does not satisfy this."
  current_state:
    description: "Clinical evidence landscape for Ravulizumab in aHUS complex scenarios."
    metrics:
      - label: "Published guidelines for post-transplant aHUS"
        value: "None"
      - label: "KOLs in target panel"
        value: "6"
      - label: "Consensus threshold"
        value: "≥75%"
      - label: "Target publication deadline"
        value: "July 2026"

solution:
  overview: >
    Sigil proposes a four-step Modified Delphi Expert Panel, generating quantifiable
    clinical consensus through structured individual interviews followed by group voting.
    The methodology produces both a peer-reviewed publication and a congress poster,
    while remaining fully compliant with TARC and FMV requirements.
  pillars:
    - title: "Evidence Baseline"
      description: "Targeted narrative review of guidelines and literature to frame clinical vignettes and define the research questions."
    - title: "Structured Expert Engagement"
      description: "1:1 in-depth interviews with each KOL to generate qualitative insights, followed by a 9-point Likert scoring round to quantify agreement."
    - title: "Scientific Dissemination"
      description: "Full peer-reviewed manuscript in English and Spanish, plus a scientific congress poster — translating expert consensus into actionable clinical guidance."
  differentiators:
    - title: "Rigorous consensus methodology"
      description: "Modified Delphi with defined consensus (≥75%) and divergence criteria, median scores, and IQR analysis — not a simple advisory board."
    - title: "End-to-end HCP management"
      description: "Sigil manages the full administrative lifecycle: contracting, FMV honoraria processing, compliance documentation, and reporting."
    - title: "Senior clinical + scientific leadership"
      description: "Tiago Taveira-Gomes (MD, PhD) and João Gancho Figueiredo (MD) provide strategic and clinical oversight throughout, with a PhD-level medical writer for the manuscript."

