executive_summary:
  headline: "Shifting wound care procurement from unit cost to patient outcomes — a scalable national blueprint"
  body: >
    Sigil Scientific Enterprises proposes a strategic partnership with NUPCO to implement
    a National Transformation Model for Value-Based Procurement in Wound Care, specifically
    focusing on Diabetic Foot Care. This initiative shifts procurement from traditional
    volume-based purchasing to an outcome-driven model that incentivises healing, reduces
    complications, and optimises the total cost of care. Beginning with a 12-month pilot
    on Diabetic Foot Ulcers, it delivers a scalable blueprint for managing chronic diseases
    in direct alignment with Saudi Vision 2030.
  key_points:
    - "Outcome-Driven Procurement — pay for healing, not products"
    - "12-Month DFU Pilot with live KPI monitoring across participating hospitals"
    - "Multidisciplinary execution combining clinical, data, and procurement expertise"
    - "Scalable National Blueprint replicable across chronic disease categories"
    - "Full alignment with Saudi Vision 2030 healthcare transformation goals"

context:
  problem_statement: >
    The Kingdom of Saudi Arabia faces a significant and growing burden from diabetes. The
    current procurement model, focused on unit cost, fails to address the true cost of
    care — the "cost of failure" associated with prolonged hospitalisations and severe
    complications such as amputation. A systemic shift towards value-based procurement
    is required to align supplier incentives with patient outcomes.
  pain_points:
    - title: "High DFU Prevalence"
      description: "18.3% adult diabetes prevalence in KSA; 34% lifetime DFU risk for diabetics — one of the highest burdens globally."
    - title: "Volume-Based Incentives"
      description: "Current procurement rewards product volume, not outcomes. Suppliers have no incentive to prevent complications or reduce hospital stays."
    - title: "Severe Complication Rates"
      description: "31% of DFU cases lead to amputation; 5-year post-amputation mortality is 42%. The human and economic cost is preventable."
    - title: "No Outcome Measurement Framework"
      description: "Absence of standardised KPIs across hospitals means there is no visibility into care quality or supplier contribution to outcomes."
  current_state:
    description: "Baseline burden metrics for Diabetic Foot Ulcers in the Kingdom of Saudi Arabia."
    metrics:
      - label: "Adult Diabetes Prevalence"
        value: "18.3%"
      - label: "Lifetime DFU Risk"
        value: "34%"
      - label: "DFU Cases → Amputation"
        value: "31%"
      - label: "5-Year Post-Amputation Mortality"
        value: "42%"

solution:
  overview: >
    Sigil proposes a comprehensive Value-Based Procurement framework for Diabetic Foot
    Care, grounded in an integrated care pathway spanning screening through long-term
    maintenance. The model links supplier contracts to measurable patient outcomes,
    creating a shared-risk structure where procurement cost tracks directly with
    clinical performance.
  pillars:
    - title: "Outcome-Linked Contracts"
      description: "Procurement agreements tied to Tier 1 clinical outcomes (healing rate, amputation rate), Tier 2 patient-reported outcomes, and Tier 3 cost-of-care metrics."
    - title: "Data Infrastructure"
      description: "Robust real-time dashboards monitoring KPIs across the pilot cohort, enabling monthly performance reviews and rapid course-correction."
    - title: "Supplier Prequalification"
      description: "Structured supplier assessment framework measuring impact on pathology (healing efficacy, complication reduction) and on providers (training, supply chain, cost efficiency)."
  differentiators:
    - title: "Proven VBHC methodology"
      description: "Sigil brings a tested framework for value-based healthcare implementation, adapted for the Saudi procurement and regulatory context."
    - title: "End-to-end execution"
      description: "From stakeholder alignment through pilot launch to national blueprint — one partner owns the full delivery chain."
    - title: "Academic output"
      description: "Pilot findings are structured for peer-reviewed publication, creating lasting scientific credibility for the NUPCO model."

